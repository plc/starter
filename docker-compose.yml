# Docker Compose configuration for local development (SQLite mode)
#
# Architecture:
#   app (node.js) -> ./data/myapp.db (SQLite)
#
# Usage:
#   docker compose up --build     # Start everything
#   docker compose down           # Stop everything
#   docker compose logs -f app    # View app logs
#
# Port: Determined by project name. Run ./scripts/get-port.sh to see your port.

services:
  # Node.js application
  app:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - APP_NAME=${APP_NAME:-myapp}
      - DB_TYPE=sqlite
      - SQLITE_PATH=/app/data/myapp.db
      - PORT=${PORT:-3000}
    volumes:
      - ./data:/app/data
